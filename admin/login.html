<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIBEDO - Acceso administrador</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/styles.css" />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--font-body);
        background:
          radial-gradient(
            circle at top left,
            var(--color-primary-light),
            transparent 35%
          ),
          linear-gradient(135deg, #f8fbff 0%, #ffffff 100%);
        color: var(--color-text);
      }

      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--space-8);
      }

      .login-wrapper {
        width: 100%;
        max-width: 460px;
      }

      .login-brand {
        text-align: center;
        margin-bottom: var(--space-6);
      }

      .login-logo {
        font-family: var(--font-heading);
        font-size: 2rem;
        font-weight: var(--fw-bold);
        letter-spacing: -0.02em;
        text-decoration: none;
        display: inline-block;
      }

      .login-logo .sib {
        color: var(--color-primary);
      }

      .login-logo .edo {
        color: var(--color-accent);
      }

      .login-card {
        background-color: white;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-2xl);
        padding: var(--space-8);
        box-shadow: 0 20px 50px rgba(37, 99, 235, 0.08);
      }

      .login-title {
        font-family: var(--font-heading);
        font-size: var(--fs-3xl);
        font-weight: var(--fw-bold);
        margin: 0 0 var(--space-2);
        text-align: center;
      }

      .login-subtitle {
        margin: 0 0 var(--space-7);
        text-align: center;
        color: var(--color-text-soft);
        font-size: var(--fs-sm);
      }

      .form-group {
        margin-bottom: var(--space-5);
      }

      .form-label {
        display: block;
        margin-bottom: var(--space-2);
        font-size: var(--fs-sm);
        font-weight: var(--fw-semibold);
        color: var(--color-text);
      }

      .form-input {
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        font-size: var(--fs-base);
        font-family: var(--font-body);
        background-color: white;
        color: var(--color-text);
        outline: none;
        box-sizing: border-box;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .form-input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      }

      .form-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-4);
        margin-bottom: var(--space-6);
        flex-wrap: wrap;
      }

      .remember-me {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        font-size: var(--fs-sm);
        color: var(--color-text-soft);
        cursor: pointer;
      }

      .remember-me input {
        width: 16px;
        height: 16px;
        accent-color: var(--color-primary);
      }

      .forgot-link {
        font-size: var(--fs-sm);
        color: var(--color-primary);
        text-decoration: none;
        font-weight: var(--fw-medium);
      }

      .forgot-link:hover {
        text-decoration: underline;
      }

      .login-btn {
        width: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 1.25rem;
        border: none;
        border-radius: var(--radius-lg);
        background-color: var(--color-primary);
        color: white;
        font-size: var(--fs-base);
        font-weight: var(--fw-semibold);
        font-family: var(--font-body);
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          opacity 0.2s ease;
      }

      .login-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .back-link {
        margin-top: var(--space-6);
        text-align: center;
      }

      .back-link a {
        color: var(--color-text-soft);
        text-decoration: none;
        font-size: var(--fs-sm);
        font-weight: var(--fw-medium);
      }

      .back-link a:hover {
        color: var(--color-primary);
      }

      @media (max-width: 520px) {
        .login-page {
          padding: var(--space-5);
        }

        .login-card {
          padding: var(--space-6);
        }

        .login-title {
          font-size: var(--fs-2xl);
        }

        .form-row {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="login-page">
      <div class="login-wrapper">
        <div class="login-brand">
          <a href="../index.html" class="login-logo" aria-label="SIBEDO">
            <span class="sib">SIBE</span><span class="edo">DO</span>
          </a>
        </div>

        <section class="login-card">
          <h1 class="login-title">Acceso administrador</h1>
          <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

          <form>
            <div class="form-group">
              <label for="email" class="form-label">Correo electrónico</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="admin@sibedo.edu.do"
                required
              />
            </div>

            <div class="form-group">
              <label for="password" class="form-label">Contraseña</label>
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Ingresa tu contraseña"
                required
              />
            </div>

            <div class="form-row">
              <label class="remember-me">
                <input type="checkbox" name="remember" />
                <span>Recordarme</span>
              </label>

              <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="login-btn">Iniciar sesión</button>
          </form>
        </section>

        <div class="back-link">
          <a href="../index.html">← Volver al sitio público</a>
        </div>
      </div>
    </main>
  </body>
</html>
